# yaml-language-server: $schema=https://dv-flow.github.io/flow.dv.schema.json
fragment:
  # Phase-4 RVFI emission test: an rvfi_if sink (FW_RVFI_IMP) bound to the core's
  # rvfi port checks the emitted record stream (retire / load / store / trap).
  tasks:
  - name: rvfi-tb
    uses: std.FileSet
    with:
      type: systemVerilogSource
      include:
      - ibex_rvfi_tb.sv
      incdirs:
      - .

  # spl transitively carries fw.proto.rvfi.files (the rvfi_if package + the
  # incdir where fw_proto_rvfi_macros.svh lives).
  - name: rvfi-img
    uses: hdlsim.vlt.SimImage
    needs: [spl, fw.mem.files, rvfi-tb]
    with:
      top: [ibex_rvfi_tb]

  - root: rvfi
    uses: hdlsim.vlt.SimRun
    needs: [rvfi-img]
